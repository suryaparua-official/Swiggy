name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  # ──── JOB 1: Security Scan ────
  security-scan:
    name: Snyk dependency scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --all-projects
        continue-on-error: true

  build-and-scan:
    name: Build + Trivy scan — ${{ matrix.service }}
    needs: security-scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth
            context: ./services/auth
          - service: restaurant
            context: ./services/restaurant
          - service: utils
            context: ./services/utils
          - service: realtime
            context: ./services/realtime
          - service: rider
            context: ./services/rider
          - service: admin
            context: ./services/admin
          - service: frontend
            context: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          load: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/swiggy-${{ matrix.service }}:${{ github.sha }}
          build-args: |
            VITE_AUTH_URL=${{ secrets.VITE_AUTH_URL }}
            VITE_RESTAURANT_URL=${{ secrets.VITE_RESTAURANT_URL }}
            VITE_UTILS_URL=${{ secrets.VITE_UTILS_URL }}
            VITE_REALTIME_URL=${{ secrets.VITE_REALTIME_URL }}
            VITE_RIDER_URL=${{ secrets.VITE_RIDER_URL }}
            VITE_ADMIN_URL=${{ secrets.VITE_ADMIN_URL }}
            VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            VITE_STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}
            VITE_INTERNAL_SERVICE_KEY=${{ secrets.INTERNAL_SERVICE_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKERHUB_USERNAME }}/swiggy-${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Push image to DockerHub
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/swiggy-${{ matrix.service }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/swiggy-${{ matrix.service }}:${{ github.sha }}
          build-args: |
            VITE_AUTH_URL=${{ secrets.VITE_AUTH_URL }}
            VITE_RESTAURANT_URL=${{ secrets.VITE_RESTAURANT_URL }}
            VITE_UTILS_URL=${{ secrets.VITE_UTILS_URL }}
            VITE_REALTIME_URL=${{ secrets.VITE_REALTIME_URL }}
            VITE_RIDER_URL=${{ secrets.VITE_RIDER_URL }}
            VITE_ADMIN_URL=${{ secrets.VITE_ADMIN_URL }}
            VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            VITE_STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}
            VITE_INTERNAL_SERVICE_KEY=${{ secrets.INTERNAL_SERVICE_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
