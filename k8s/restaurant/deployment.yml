apiVersion: apps/v1
kind: Deployment
metadata:
  name: restaurant-service
  namespace: swiggy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: restaurant-service
  template:
    metadata:
      labels:
        app: restaurant-service
    spec:
      containers:
        - name: restaurant
          image: surya850/swiggy-restaurant:2c7b564e2c3f9fb2ce01051cea5ef353df57e6e9
          ports:
            - containerPort: 5001
          env:
            - name: PORT
              value: "5001"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: swiggy-config
                  key: NODE_ENV
            - name: JWT_SEC
              valueFrom:
                secretKeyRef:
                  name: swiggy-secrets
                  key: JWT_SEC
            - name: INTERNAL_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: swiggy-secrets
                  key: INTERNAL_SERVICE_KEY
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: swiggy-secrets
                  key: MONGO_URI
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: swiggy-secrets
                  key: RABBITMQ_URL
            - name: UTILS_SERVICE
              valueFrom:
                configMapKeyRef:
                  name: swiggy-config
                  key: UTILS_SERVICE
            - name: REALTIME_SERVICE
              valueFrom:
                configMapKeyRef:
                  name: swiggy-config
                  key: REALTIME_SERVICE
            - name: PAYMENT_QUEUE
              valueFrom:
                configMapKeyRef:
                  name: swiggy-config
                  key: PAYMENT_QUEUE
            - name: RIDER_QUEUE
              valueFrom:
                configMapKeyRef:
                  name: swiggy-config
                  key: RIDER_QUEUE
            - name: ORDER_READY_QUEUE
              valueFrom:
                configMapKeyRef:
                  name: swiggy-config
                  key: ORDER_READY_QUEUE
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 5
